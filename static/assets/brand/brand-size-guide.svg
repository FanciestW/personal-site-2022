<svg width="720" height="420" viewBox="0 0 720 420" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="720" height="420" rx="24" fill="#090B12"/><text x="32" y="42" fill="#F4F5FB" font-family="Arial" font-size="18" font-weight="700">&gt;WL. — Responsive Logo System</text><text x="32" y="64" fill="#9DA3B5" font-family="Arial" font-size="11">One identity, simplified deliberately for each usage size.</text><rect x="32" y="92" width="656" height="100" rx="16" fill="#11131E" stroke="#292D3C"/><image href="logo-full.svg" x="56" y="110" width="224" height="64"/><text x="350" y="128" fill="#5CF2B7" font-family="Arial" font-size="10" font-weight="700">FULL LOCKUP · 160PX+</text><text x="350" y="150" fill="#F4F5FB" font-family="Arial" font-size="12">Headers, résumé, social banners</text><text x="350" y="169" fill="#9DA3B5" font-family="Arial" font-size="10">Includes cursor and full name.</text><rect x="32" y="208" width="316" height="92" rx="16" fill="#11131E" stroke="#292D3C"/><image href="logo-compact.svg" x="50" y="225" width="84" height="36"/><text x="154" y="238" fill="#5CF2B7" font-family="Arial" font-size="9" font-weight="700">COMPACT · 64–159PX</text><text x="154" y="258" fill="#F4F5FB" font-family="Arial" font-size="11">Website navigation</text><text x="154" y="276" fill="#9DA3B5" font-family="Arial" font-size="9">Prompt, initials, status.</text><rect x="372" y="208" width="316" height="92" rx="16" fill="#11131E" stroke="#292D3C"/><image href="favicon.svg" x="396" y="230" width="48" height="48"/><text x="464" y="238" fill="#5CF2B7" font-family="Arial" font-size="9" font-weight="700">FAVICON · 24–63PX</text><text x="464" y="258" fill="#F4F5FB" font-family="Arial" font-size="11">Prompt + W</text><text x="464" y="276" fill="#9DA3B5" font-family="Arial" font-size="9">Legible in browser tabs.</text><rect x="32" y="316" width="656" height="72" rx="16" fill="#11131E" stroke="#292D3C"/><image href="favicon-micro.svg" x="56" y="336" width="32" height="32"/><text x="112" y="344" fill="#5CF2B7" font-family="Arial" font-size="9" font-weight="700">MICRO · 16PX</text><text x="112" y="364" fill="#F4F5FB" font-family="Arial" font-size="11">Terminal essence only: prompt, cursor, status.</text><text x="430" y="344" fill="#9DA3B5" font-family="Arial" font-size="9">CLEAR SPACE</text><text x="430" y="364" fill="#F4F5FB" font-family="Arial" font-size="10">Minimum: one status-dot width.</text></svg>
